name: Viper

services:
  postgres:
    build: ./db
    env_file: ./env/db.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes: 
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  viper:
    build: ./viper
    env_file: ./env/viper.env
    volumes:
      - ./viper-stamps:/srv/stamps
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
